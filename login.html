<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-form">
        <h2>Login</h2>
        <div class="form">
            <input type="name" id="name" placeholder="Fullname">
            <input type="email" id="email" placeholder="@gmail.com">
            <button type="submit" id="submit">Login</button>
        </div>
        <div class="note">
        <p>Do not have an account?</p> <a href="/">Sign up</a>
        </div>
    </div>
</body>
</html>
